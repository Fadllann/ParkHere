services:
  db:
    image: mysql:8.0
    container_name: parking_db
    environment:
      MYSQL_ROOT_PASSWORD: GparkingApp
      MYSQL_DATABASE: parking_db
      MYSQL_USER: parking_app
      MYSQL_PASSWORD: parking_app321
    volumes:
      - mysql-data:/var/lib/mysql
    cpus: 0.5
    mem_limit: 2g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pGparkingApp"]
      interval: 10s
      timeout: 5s
      retries: 5

  db_phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: parking_db_phpmyadmin
    ports:
      - "8081:80"
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_USER: parking_app
      PMA_PASSWORD: parking_app321
    cpus: 0.5
    mem_limit: 512m
    restart: unless-stopped

  plate_service:
    build: ./plate_service
    container_name: parking_plate_service
    ports:
      - "5001:5001"
    restart: unless-stopped
    environment:
      - PORT=5001
      - HF_HOME=/root/.cache
      - EASYOCR_HOME=/root/.cache/easyocr
    volumes:
      - ./plate_service:/app
      - yolo_cache:/root/.cache
      - plate_models:/root/.cache/easyocr
      - ./debug_frames:/tmp/debug
      - ./server/uploads:/app/uploads
    cpus: 2.0
    mem_limit: 4g
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: parking_server
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: parking_app
      DB_PASSWORD: parking_app321
      DB_NAME: parking_db
      JWT_SECRET: parking_v2DZ9at7Wg
      PLATE_SERVICE_URL: http://plate_service:5001
    ports:
      - "5000:5000"
    restart: unless-stopped
    volumes:
      - ./server:/app
      - server-node-modules:/app/node_modules
      - ./server/uploads:/app/uploads
    cpus: 0.5
    mem_limit: 1g

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: parking_client
    depends_on:
      - server
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://server:5000
    restart: unless-stopped
    volumes:
      - ./client:/app
      - client-node-modules:/app/node_modules
    cpus: 0.5
    mem_limit: 1g

volumes:
  mysql-data:
  yolo_cache:
  plate_models:
  server-node-modules:
  client-node-modules: